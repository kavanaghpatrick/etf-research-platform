[tool:pytest]
# Pytest configuration for async implementation tests
minversion = 6.0
addopts = -ra -q --strict-markers --cov=. --cov-report=html --cov-report=term-missing --cov-fail-under=80
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async test configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    asyncio: marks tests as async
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    performance: marks tests as performance tests
    vercel: marks tests as Vercel-specific tests

# Test output
console_output_style = progress
junit_family = xunit2

# Timeout configuration
timeout = 300
timeout_method = thread

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:yfinance